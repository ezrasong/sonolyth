name: Sonolyth Release (Android)
on:
  workflow_dispatch:
    inputs:
      channel:
        type: choice
        options:
          - stable
          - nightly
        default: stable
        description: The release channel
      dry_run:
        type: boolean
        default: false
        description: Build only, don't publish a GitHub release

env:
  FLUTTER_VERSION: 3.35.2
  FLUTTER_CHANNEL: master
  # Harden cargo's crates.io downloads against transient network failures
  # (curl 56 "unexpected eof" killed builds mid-download); retry more and
  # disable HTTP/2 multiplexing, which is where those resets surface.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

permissions:
  contents: write

jobs:
  build_android:
    runs-on: ubuntu-22.04
    env:
      # secrets can't be used directly in a step `if:`; surface a boolean here
      # (job-level env may reference secrets) and gate the keystore step on it.
      HAS_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2.18.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true
          git-source: https://github.com/flutter/flutter.git

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"
          cache: "gradle"
          check-latest: true

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install android dependencies
        run: |
          flutter pub get
          dart cli/cli.dart install-dependencies --platform=android --arch=all

      # A consistent release keystore (from repo secrets) signs every build;
      # without it each CI run debug-signs with a fresh key, and Android
      # refuses to update an installed app over a signature mismatch.
      - name: Setup release keystore
        if: ${{ env.HAS_KEYSTORE == 'true' }}
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # Strip any stray CR/whitespace the secret may have picked up in
          # transit before decoding, so `base64` doesn't choke on it.
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | tr -d '\r\n ' | base64 -d > android/app/release.keystore
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=release.keystore
          EOF

      - name: Build android apk
        # Published builds must always poll GitHub releases for updates, no
        # matter what the dotenv secret says: strip any ENABLE_UPDATE_CHECK
        # line it carries and pin the flag on before handing it to the CLI.
        run: |
          DOTENV="$(printf '%s\n' "$DOTENV" | grep -v '^ENABLE_UPDATE_CHECK=' || true)"
          DOTENV="${DOTENV}
          ENABLE_UPDATE_CHECK=1"
          export DOTENV
          dart cli/cli.dart build --arch=all android
        env:
          CHANNEL: ${{ inputs.channel }}
          DOTENV: ${{ secrets.DOTENV_RELEASE }}

      - uses: actions/upload-artifact@v4
        with:
          if-no-files-found: error
          name: android-all
          path: build/Sonolyth-android-all-arch.apk

  release:
    runs-on: ubuntu-22.04
    if: ${{ !inputs.dry_run }}
    needs:
      - build_android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: ./binaries

      - name: Generate checksums
        run: |
          find binaries -type f -exec sha256sum {} \; >> RELEASE.sha256sum
          sed -i 's|binaries/.*/\([^/]*\)$|\1|' RELEASE.sha256sum

      - name: Extract pubspec version
        run: |
          echo "PUBSPEC_VERSION=$(grep -oP 'version:\s*\K[^+]+(?=\+)' pubspec.yaml)" >> $GITHUB_ENV

      - name: Upload release (stable)
        if: ${{ inputs.channel == 'stable' }}
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: v${{ env.PUBSPEC_VERSION }}
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          omitPrereleaseDuringUpdate: true
          allowUpdates: true
          artifacts: binaries/**/*,RELEASE.sha256sum

      - name: Upload release (nightly)
        if: ${{ inputs.channel == 'nightly' }}
        uses: ncipollo/release-action@v1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: nightly
          prerelease: true
          omitBodyDuringUpdate: true
          omitNameDuringUpdate: true
          allowUpdates: true
          artifacts: binaries/**/*,RELEASE.sha256sum
          body: |
            Build Number: ${{ github.run_number }}
